，火然则回，船走去，去复还烧者，须臾烧数千(?脾)。火大起，光上照天，操夜走。 </div> <div class="wenzabout"> <div class="nextxs"> <a href="1650863434.html" title="《英雄记》张咨"> ← 上一章 </a></div> <div class="fhmulu"><a href="yingxiongji1.html" title="《英雄记》正文">章节目录</a></div> <div class="nextxs"> <a href="1650863413.html" title="《英雄记》孔文举"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
