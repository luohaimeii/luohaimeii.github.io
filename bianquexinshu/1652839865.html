溃烂于顷刻，急服姜附汤，甚者灸石门穴。(肾主骨，齿乃骨之余，破伤宣露，风邪直袭肾经，致溃烂于俄顷，舍姜附而用寒凉为变，可胜道哉。）</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652839876.html" title="《扁鹊心书》卷中·洗头风"> ← 上一章 </a></div> <div class="fhmulu"><a href="bianquexinshu3.html" title="《扁鹊心书》卷中">章节目录</a></div> <div class="nextxs"> <a href="1652839855.html" title="《扁鹊心书》卷中·水肿"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
