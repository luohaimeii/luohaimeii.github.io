国史，著《晋纪》二十卷，记西晋一代史事，时称良史，今佚，仅存片断。历数十年而成《搜神记》，原书为三十卷，唐宋时尤存，大概在宋元之际佚失。今本为二十卷。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1653801868.html" title="《搜神记》版本流传"> ← 上一章 </a></div> <div class="fhmulu"><a href="soushenjibaike.html" title="《搜神记》百科">章节目录</a></div> <div class="nextxs"> <a href="/liaozhaizhiyi/1653801751.html" title="《聊斋志异》内容简介"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
