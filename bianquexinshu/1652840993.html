。若一二日者，服此可治，五七日者难治，须急灸脐下三百壮。</p> <p>　　川乌（炮，二两） 防风（二两） 雄黄（一两）共为末。每服四钱，水煎，和渣服，日三次，出汗愈。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652841003.html" title="《扁鹊心书》神方·阿胶散"> ← 上一章 </a></div> <div class="fhmulu"><a href="bianquexinshu5.html" title="《扁鹊心书》神方">章节目录</a></div> <div class="nextxs"> <a href="1652840982.html" title="《扁鹊心书》神方·安虫散"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
