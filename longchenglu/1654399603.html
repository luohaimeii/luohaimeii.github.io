又得卦曰铸印乘轩，存澄启谢曰：昔此卦三灵为最善，黄帝胜炎帝而筮得之，所谓合因斩关铸印乘轩，始当果断终得嗣天。上皇掩其口曰：止矣，默识之矣。后即位应其术焉。 </div> <div class="wenzabout"> <div class="nextxs"> <a href="1654399613.html" title="《龙城录》开元藏书七万卷"> ← 上一章 </a></div> <div class="fhmulu"><a href="longchenglu1.html" title="《龙城录》正文">章节目录</a></div> <div class="nextxs"> <a href="1654399592.html" title="《龙城录》明皇梦姚宋当为相"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
