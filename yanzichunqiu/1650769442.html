公使烛邹主鸟而亡之公怒将加诛晏子谏"> 下一章 → </a></div> </div> <div class="wenzbody"> <p>　　<strong>景公筑长庲台晏子舞而谏</strong></p> <p>　　景公筑长庲之台，晏子侍坐。觞三行，晏子起舞曰： “岁已暮矣，而禾不获，忽忽矣若之何！岁已寒矣，而役不罢，惙惙矣如之何！”舞三，而涕下沾襟。景公惭焉，为之罢长庲之役。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1650769454.html" title="《晏子春秋》卷七·外篇·篇十一 景公台成盆成适愿合葬其母晏子谏而许"> ← 上一章 </a></div> <div class="fhmulu"><a href="yanzichunqiu7.html" title="《晏子春秋》卷七·外篇">章节目录</a></div> <div class="nextxs"> <a href="1650769430.html" title="《晏子春秋》卷七·外篇·篇十三 景公使烛邹主鸟而亡之公怒将加诛晏子谏"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
