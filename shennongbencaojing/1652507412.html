苦。主胸胁下痛，邪气，腹问寒热阴痹。久服，轻身益气，耐老（《御览》作补益能老）。生川泽（旧在《唐本草》中无毒，今增）。</p> <p>　　《名医》曰：生汉中，五月采。</p> <p>　　案陶宏景云：方药不复用，俗无识者。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652507423.html" title="《神农本草经》上品·草部·别羁"> ← 上一章 </a></div> <div class="fhmulu"><a href="shennongbencaojing2.html" title="《神农本草经》上品·草部">章节目录</a></div> <div class="nextxs"> <a href="1652507402.html" title="《神农本草经》上品·草部·淮木"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
