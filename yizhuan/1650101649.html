<span style="color:#af9100;">　　此为乾坤八卦之一个取象系统，可以称之为八卦性情取象系列。　　乾为刚健，坤为柔顺，震为运动，巽为进入，坎为沉陷，离为丽附，艮为止息，兑为高兴。</span></p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1650101658.html" title="《易传》说卦传·第六章"> ← 上一章 </a></div> <div class="fhmulu"><a href="yizhuan8.html" title="《易传》说卦传">章节目录</a></div> <div class="nextxs"> <a href="1650101639.html" title="《易传》说卦传·第八章"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
