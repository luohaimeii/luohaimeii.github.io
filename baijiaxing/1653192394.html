革和冬天衣服，裘官的后代称?裘氏。</p> <p><strong>家族名人</strong></p> <p>　　裘日修</p> <p>　　清代人。 多次勘视山东、河南、安徽河道，还监督修浚永定河、北运河，官至刑部尚书。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1653192405.html" title="《百家姓》房"> ← 上一章 </a></div> <div class="fhmulu"><a href="baijiaxing1.html" title="《百家姓》正文">章节目录</a></div> <div class="nextxs"> <a href="1653192384.html" title="《百家姓》缪"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
