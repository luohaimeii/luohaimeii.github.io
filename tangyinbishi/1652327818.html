枚，卖者坚称三百枚，争至无以证明。公命别买一枚秤之，乃都称碎者纽折分两，卖者乃服。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652327828.html" title="《棠阴比事》袁滋铸金"> ← 上一章 </a></div> <div class="fhmulu"><a href="tangyinbishi1.html" title="《棠阴比事》正文">章节目录</a></div> <div class="nextxs"> <a href="1652327807.html" title="《棠阴比事》韦皋劾财"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
