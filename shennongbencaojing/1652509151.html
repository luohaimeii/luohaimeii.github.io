味苦寒。</p> <p>　　主头风，黄疸，咳逆，淋沥，女子阴中肿痛，湿痹死肌，不可屈伸，起止行步。生川谷。</p> <p>　　《名医》曰：生上谷及冤句，四月五月，采根阴干。</p> <p>　　案陶宏景云：俗呼为白羊鲜，气息正似羊膻或名白膻。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652509161.html" title="《神农本草经》中品·草部·败酱"> ← 上一章 </a></div> <div class="fhmulu"><a href="shennongbencaojing12.html" title="《神农本草经》中品·草部">章节目录</a></div> <div class="nextxs"> <a href="1652509141.html" title="《神农本草经》中品·草部·酸酱"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
