，有蝇集尸首，吏乃披髻视之，得鐡钉焉。问知此妇，与奸夫共杀其夫，按伏其罪。 </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652328437.html" title="《棠阴比事》程戡仇门"> ← 上一章 </a></div> <div class="fhmulu"><a href="tangyinbishi1.html" title="《棠阴比事》正文">章节目录</a></div> <div class="nextxs"> <a href="1652328416.html" title="《棠阴比事》妾吏酖宋"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
