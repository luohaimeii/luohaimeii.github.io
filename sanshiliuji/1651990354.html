。<br><span style="color:#af9100;">　　故意向敌人的某一方向进行佯攻以吸引敌人的注意力，然后利用敌人在这一方面固守的时机，悄悄地迂回到另一方向进行偷袭。这就是《易&#183;益》卦中所说的趁虚而入，出奇制胜。</span></p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1651990364.html" title="《三十六计》敌战计·无中生有"> ← 上一章 </a></div> <div class="fhmulu"><a href="sanshiliuji2.html" title="《三十六计》敌战计">章节目录</a></div> <div class="nextxs"> <a href="1651990345.html" title="《三十六计》敌战计·隔岸观火"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
