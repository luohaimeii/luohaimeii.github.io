还，出令曰：“鸡肋。”官属不知所谓，杨修便曰：“夫鸡肋，弃之可惜，食之。无所得，以比汉中，王欲还也。”遂引还。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1650765401.html" title="《九州春秋》庞统"> ← 上一章 </a></div> <div class="fhmulu"><a href="jiuzhouchunqiu1.html" title="《九州春秋》正文">章节目录</a></div> <div class="nextxs"> <a href="/dongguanzouji/1650705576.html" title="《东观奏记》作品内容"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
