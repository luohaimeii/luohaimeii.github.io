病原，寒不仅仅是现代所说的受寒，而是所有外邪引起疾病的统称，出处可参照郝万山先生的讲义视频，张仲景所著的《伤寒论》中的伤寒也正是该义，与现代的伤寒症无关。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="/shennongbencaojing/1652512418.html" title="《神农本草经》书籍作者考"> ← 上一章 </a></div> <div class="fhmulu"><a href="shanghanlunbaike.html" title="《伤寒论》百科">章节目录</a></div> <div class="nextxs"> <a href="1652512377.html" title="《伤寒论》内容"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
