微，发福多在晚年，或生贤子，要有印助。古歌云：正官有用不须多，多则伤身少则和，日旺再逢生印绶，定须平步擢高科。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652929819.html" title="《三命通会》卷五·岁德正官"> ← 上一章 </a></div> <div class="fhmulu"><a href="sanmingtonghui5.html" title="《三命通会》卷五">章节目录</a></div> <div class="nextxs"> <a href="1652929798.html" title="《三命通会》卷五·官印禄库"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
