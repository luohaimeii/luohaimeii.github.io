言：某有文集在建邺李氏，公当名出一时，肯为我讨是文而序之，俾我亦阴报尔。仲卿诺之。去复回曰：我曹植子建也。仲卿既寤，检邺中书得子建集，分为十卷，异而序之，即仲卿作也。 </div> <div class="wenzabout"> <div class="nextxs"> <a href="1654399851.html" title="《龙城录》房玄龄为相无嗣"> ← 上一章 </a></div> <div class="fhmulu"><a href="longchenglu1.html" title="《龙城录》正文">章节目录</a></div> <div class="nextxs"> <a href="1654399831.html" title="《龙城录》赵师雄醉憩梅花下"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
