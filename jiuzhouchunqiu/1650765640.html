<!doctype html><html lang="zh-Hans"> <head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><title>《九州春秋》胡文才杨整修-虎思国学网</title><meta name="keywords" content="《九州春秋》胡文才杨整修"><meta name="description" content="《九州春秋》胡文才杨整修"><link rel="stylesheet" type="text/css" href="/statics/css/style.css"><link rel="shortcut icon" href="/statics/picture/favicon.ico" type="image/x-icon"><meta http-equiv="Cache-Control" content="no-transform"><meta http-equiv="Cache-Control" content="no-siteapp"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"><meta name="referrer" content="origin-when-cross-origin"><meta name="applicable-device" content="pc,mobile"><meta name="MobileOptimized" content="width"><meta name="HandheldFriendly" content="true"><meta name="renderer" content="webkit"><script type="text/javascript" src="/statics/js/home.js"></script></head> <body> <div class="header"> <div class="head"> <ul class="navbar-left"> <li> <a href="/"> <img src="/statics/picture/logo.png" class="logo" alt="国学经典"> </a> </li> <li class="index_sy"> <a href="/" title="首页"> 首页 </a> </li> <li> <a href="/jing/" title="经"> 经 </a> </li> <li> <a href="/shi/" title="史"> 史 </a> </li> <li> <a href="/zi/" title="子"> 子 </a> </li> <li> <a href="/ji/" title="集"> 集 </a> </li><li> <a href="/baike/" title="百科资料"> 百科</a> </li> </ul> <script type="text/javascript" src="/statics/js/navright.js"></script> </div> </div><div class="content"> <div class="xscontent"> <div class="wenztit"><h1> 卷十二 胡文才杨整修</h1></div> <div class="wenzabout"> <div class="nextxs"> <a href="1650765650.html" title="《九州春秋》焦和"> ← 上一章 </a></div> <div class="fhmulu"><a href="jiuzhouchunqiu1.html" title="《九州春秋》正文">章节目录</a></div> <div class="nextxs"> <a href="1650765629.html" title="《九州春秋》樊稠"> 下一章 → </a></div> </div> <div class="wenzbody"> <p>　　傕等在陕，皆恐怖，急拥兵自守。胡文才、杨整修皆凉州大人，而王允素所不善也。及李傕之叛，乃呼文才、整修使东解释之，不假借以温颜，谓曰：“关东鼠子欲何为耶？卿往呼之。”于是二人往，实召兵而还。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1650765650.html" title="《九州春秋》焦和"> ← 上一章 </a></div> <div class="fhmulu"><a href="jiuzhouchunqiu1.html" title="《九州春秋》正文">章节目录</a></div> <div class="nextxs"> <a href="1650765629.html" title="《九州春秋》樊稠"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
