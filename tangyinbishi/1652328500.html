集邻里验，是其夫否，皆言井深不可辨。升曰：众不可辨，而妇人独知为夫，何耶？送狱讯问，乃奸夫杀之，妇与共谋。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652328510.html" title="《棠阴比事》杜亚疑酒"> ← 上一章 </a></div> <div class="fhmulu"><a href="tangyinbishi1.html" title="《棠阴比事》正文">章节目录</a></div> <div class="nextxs"> <a href="1652328489.html" title="《棠阴比事》欧阳左手"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
