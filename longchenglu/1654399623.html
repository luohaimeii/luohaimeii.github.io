岁弃家隐伊阳小水乡和乐村鸣皋山中，著书二十卷号鸣皋子，迩年不知其所终。山中人竟言仙去，然讹幻莫之信也。有子竦字子美亦有才然不逮于父风。 </div> <div class="wenzabout"> <div class="nextxs"> <a href="1654399634.html" title="《龙城录》李明叔精明古器"> ← 上一章 </a></div> <div class="fhmulu"><a href="longchenglu1.html" title="《龙城录》正文">章节目录</a></div> <div class="nextxs"> <a href="1654399613.html" title="《龙城录》开元藏书七万卷"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
