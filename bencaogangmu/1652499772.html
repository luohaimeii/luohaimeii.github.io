、鼓子花、 肠草、美草、天剑草、缠枝牡丹。</p> <p><strong>气味</strong><br>（花）甘、（根）辛、温、无毒。</p> <p><strong>主治</strong><br>腹中寒热邪气（用根），脸上黑痣。亦利小便，续筋骨，合刀伤，治丹毒，补劳损，益精气。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652499783.html" title="《本草纲目》草部·马兜铃"> ← 上一章 </a></div> <div class="fhmulu"><a href="bencaogangmu8.html" title="《本草纲目》草部">章节目录</a></div> <div class="nextxs"> <a href="1652499762.html" title="《本草纲目》草部·盍藤子"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
