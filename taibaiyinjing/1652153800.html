<!doctype html><html lang="zh-Hans"> <head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><title>《太白阴经》阵图·风后握奇垒篇-虎思国学网</title><meta name="keywords" content="《太白阴经》阵图·风后握奇垒篇"><meta name="description" content="《太白阴经》阵图·风后握奇垒篇"><link rel="stylesheet" type="text/css" href="/statics/css/style.css"><link rel="shortcut icon" href="/statics/picture/favicon.ico" type="image/x-icon"><meta http-equiv="Cache-Control" content="no-transform"><meta http-equiv="Cache-Control" content="no-siteapp"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"><meta name="referrer" content="origin-when-cross-origin"><meta name="applicable-device" content="pc,mobile"><meta name="MobileOptimized" content="width"><meta name="HandheldFriendly" content="true"><meta name="renderer" content="webkit"><script type="text/javascript" src="/statics/js/home.js"></script></head> <body> <div class="header"> <div class="head"> <ul class="navbar-left"> <li> <a href="/"> <img src="/statics/picture/logo.png" class="logo" alt="国学经典"> </a> </li> <li class="index_sy"> <a href="/" title="首页"> 首页 </a> </li> <li> <a href="/jing/" title="经"> 经 </a> </li> <li> <a href="/shi/" title="史"> 史 </a> </li> <li> <a href="/zi/" title="子"> 子 </a> </li> <li> <a href="/ji/" title="集"> 集 </a> </li><li> <a href="/baike/" title="百科资料"> 百科</a> </li> </ul> <script type="text/javascript" src="/statics/js/navright.js"></script> </div> </div><div class="content"> <div class="xscontent"> <div class="wenztit"><h1>阵图·风后握奇垒篇</h1></div> <div class="wenzabout"> <div class="nextxs"> <a href="1652153811.html" title="《太白阴经》阵图·阵图总序"> ← 上一章 </a></div> <div class="fhmulu"><a href="taibaiyinjing7.html" title="《太白阴经》阵图">章节目录</a></div> <div class="nextxs"> <a href="1652153790.html" title="《太白阴经》阵图·风后握奇外垒篇"> 下一章 → </a></div> </div> <div class="wenzbody"> <p>　　经曰：自风后至於太公，俱用此法。古之握奇，文不满尺，理隐难明。其范蠡、乐毅、张良、项籍、韩信、黥布，皆用此法，得其糟粕。而霍光、公孙宏、崔浩，采其华，未尽其实。今以八阵握奇，人数为垒，班布守地，阔狭顷亩，列之如後。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652153811.html" title="《太白阴经》阵图·阵图总序"> ← 上一章 </a></div> <div class="fhmulu"><a href="taibaiyinjing7.html" title="《太白阴经》阵图">章节目录</a></div> <div class="nextxs"> <a href="1652153790.html" title="《太白阴经》阵图·风后握奇外垒篇"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
