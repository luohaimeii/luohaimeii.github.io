or:#af9100;">　　道的运动是循环往复的运动变化，道的作用是微妙、柔弱的。天下间万物都是生于有形的物质，而有形的物质又产生于不可见的无形物质。</span></p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1654847141.html" title="《老子》德经·第三十九章"> ← 上一章 </a></div> <div class="fhmulu"><a href="laozi2.html" title="《老子》德经">章节目录</a></div> <div class="nextxs"> <a href="1654847123.html" title="《老子》德经·第四十一章"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
