<!doctype html><html lang="zh-Hans"> <head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><title>《聊斋志异》卷二·龁石-虎思国学网</title><meta name="keywords" content="《聊斋志异》卷二·龁石"><meta name="description" content="《聊斋志异》卷二·龁石"><link rel="stylesheet" type="text/css" href="/statics/css/style.css"><link rel="shortcut icon" href="/statics/picture/favicon.ico" type="image/x-icon"><meta http-equiv="Cache-Control" content="no-transform"><meta http-equiv="Cache-Control" content="no-siteapp"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"><meta name="referrer" content="origin-when-cross-origin"><meta name="applicable-device" content="pc,mobile"><meta name="MobileOptimized" content="width"><meta name="HandheldFriendly" content="true"><meta name="renderer" content="webkit"><script type="text/javascript" src="/statics/js/home.js"></script></head> <body> <div class="header"> <div class="head"> <ul class="navbar-left"> <li> <a href="/"> <img src="/statics/picture/logo.png" class="logo" alt="国学经典"> </a> </li> <li class="index_sy"> <a href="/" title="首页"> 首页 </a> </li> <li> <a href="/jing/" title="经"> 经 </a> </li> <li> <a href="/shi/" title="史"> 史 </a> </li> <li> <a href="/zi/" title="子"> 子 </a> </li> <li> <a href="/ji/" title="集"> 集 </a> </li><li> <a href="/baike/" title="百科资料"> 百科</a> </li> </ul> <script type="text/javascript" src="/statics/js/navright.js"></script> </div> </div><div class="content"> <div class="xscontent"> <div class="wenztit"><h1>卷二·龁石</h1></div> <div class="wenzabout"> <div class="nextxs"> <a href="1653790412.html" title="《聊斋志异》卷二·董生"> ← 上一章 </a></div> <div class="fhmulu"><a href="liaozhaizhiyi2.html" title="《聊斋志异》卷二">章节目录</a></div> <div class="nextxs"> <a href="1653790391.html" title="《聊斋志异》卷二·庙鬼"> 下一章 → </a></div> </div> <div class="wenzbody"> <p>　　新城王钦文太翁家有圉人王姓，初入劳山学道，久之不火食，惟啖松子及白石。遍体生毛。既数年，念母老归里，渐复火食，犹啖石如故。向日视之，即知石之甘苦酸咸，如啖芋然。母死，复入山，今又十七八年矣。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1653790412.html" title="《聊斋志异》卷二·董生"> ← 上一章 </a></div> <div class="fhmulu"><a href="liaozhaizhiyi2.html" title="《聊斋志异》卷二">章节目录</a></div> <div class="nextxs"> <a href="1653790391.html" title="《聊斋志异》卷二·庙鬼"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
