<!doctype html><html lang="zh-Hans"> <head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><title>《高士传》卷下·胡昭-虎思国学网</title><meta name="keywords" content="《高士传》卷下·胡昭"><meta name="description" content="《高士传》卷下·胡昭"><link rel="stylesheet" type="text/css" href="/statics/css/style.css"><link rel="shortcut icon" href="/statics/picture/favicon.ico" type="image/x-icon"><meta http-equiv="Cache-Control" content="no-transform"><meta http-equiv="Cache-Control" content="no-siteapp"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"><meta name="referrer" content="origin-when-cross-origin"><meta name="applicable-device" content="pc,mobile"><meta name="MobileOptimized" content="width"><meta name="HandheldFriendly" content="true"><meta name="renderer" content="webkit"><script type="text/javascript" src="/statics/js/home.js"></script></head> <body> <div class="header"> <div class="head"> <ul class="navbar-left"> <li> <a href="/"> <img src="/statics/picture/logo.png" class="logo" alt="国学经典"> </a> </li> <li class="index_sy"> <a href="/" title="首页"> 首页 </a> </li> <li> <a href="/jing/" title="经"> 经 </a> </li> <li> <a href="/shi/" title="史"> 史 </a> </li> <li> <a href="/zi/" title="子"> 子 </a> </li> <li> <a href="/ji/" title="集"> 集 </a> </li><li> <a href="/baike/" title="百科资料"> 百科</a> </li> </ul> <script type="text/javascript" src="/statics/js/navright.js"></script> </div> </div><div class="content"> <div class="xscontent"> <div class="wenztit"><h1> 卷二十七 卷下·胡昭</h1></div> <div class="wenzabout"> <div class="nextxs"> <a href="1650863062.html" title="《高士传》卷下·荀靖"> ← 上一章 </a></div> <div class="fhmulu"><a href="gaoshizhuan4.html" title="《高士传》卷下">章节目录</a></div> <div class="nextxs"> <a href="1650863042.html" title="《高士传》卷下·焦先"> 下一章 → </a></div> </div> <div class="wenzbody"> <p>　　胡昭字孔明，颍川人也。始避地冀州，不应袁绍之命。武帝亦辟昭，昭自陈本志。帝曰：“人各有志，出处不同。勉卒高尚，义不相屈。”昭乃隐陆浑山中，躬耕乐道，以经籍自娱。至嘉平初，年八十九，卒于家。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1650863062.html" title="《高士传》卷下·荀靖"> ← 上一章 </a></div> <div class="fhmulu"><a href="gaoshizhuan4.html" title="《高士传》卷下">章节目录</a></div> <div class="nextxs"> <a href="1650863042.html" title="《高士传》卷下·焦先"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
