蕴诸子之奥等语，因名《云笈七签》；并称编纂此书的目的是上以酬真宗皇帝委遇之恩，次以备皇帝陛下乙夜之览，下以裨文馆校雠之职，外此而少畅玄风耳。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="/wuzhenpian/1655005626.html" title="《悟真篇》相关赏析"> ← 上一章 </a></div> <div class="fhmulu"><a href="yunjiqiqianbaike.html" title="《云笈七签》百科">章节目录</a></div> <div class="nextxs"> <a href="1655005576.html" title="《云笈七签》分卷"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
