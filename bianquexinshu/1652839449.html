<!doctype html><html lang="zh-Hans"> <head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><title>《扁鹊心书》卷中·溺血-虎思国学网</title><meta name="keywords" content="《扁鹊心书》卷中·溺血"><meta name="description" content="《扁鹊心书》卷中·溺血"><link rel="stylesheet" type="text/css" href="/statics/css/style.css"><link rel="shortcut icon" href="/statics/picture/favicon.ico" type="image/x-icon"><meta http-equiv="Cache-Control" content="no-transform"><meta http-equiv="Cache-Control" content="no-siteapp"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"><meta name="referrer" content="origin-when-cross-origin"><meta name="applicable-device" content="pc,mobile"><meta name="MobileOptimized" content="width"><meta name="HandheldFriendly" content="true"><meta name="renderer" content="webkit"><script type="text/javascript" src="/statics/js/home.js"></script></head> <body> <div class="header"> <div class="head"> <ul class="navbar-left"> <li> <a href="/"> <img src="/statics/picture/logo.png" class="logo" alt="国学经典"> </a> </li> <li class="index_sy"> <a href="/" title="首页"> 首页 </a> </li> <li> <a href="/jing/" title="经"> 经 </a> </li> <li> <a href="/shi/" title="史"> 史 </a> </li> <li> <a href="/zi/" title="子"> 子 </a> </li> <li> <a href="/ji/" title="集"> 集 </a> </li><li> <a href="/baike/" title="百科资料"> 百科</a> </li> </ul> <script type="text/javascript" src="/statics/js/navright.js"></script> </div> </div><div class="content"> <div class="xscontent"> <div class="wenztit"><h1> 卷六十七 卷中·溺血</h1></div> <div class="wenzabout"> <div class="nextxs"> <a href="1652839460.html" title="《扁鹊心书》卷中·便闭"> ← 上一章 </a></div> <div class="fhmulu"><a href="bianquexinshu3.html" title="《扁鹊心书》卷中">章节目录</a></div> <div class="nextxs"> <a href="1652839439.html" title="《扁鹊心书》卷中·淋证"> 下一章 → </a></div> </div> <div class="wenzbody"> <p>　　凡膏粱人，火热内积，又多房劳，真水既涸，致阴血不静，流入膀胱，从小便而出。可服延寿丹，甚者灸关元。若少壮人，只作火热治之，然在因病制宜。（火热为积，实证也，一剂寒凉可解；房劳传肾，虚证也，非温补不可。审证而治，大有分别。）</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652839460.html" title="《扁鹊心书》卷中·便闭"> ← 上一章 </a></div> <div class="fhmulu"><a href="bianquexinshu3.html" title="《扁鹊心书》卷中">章节目录</a></div> <div class="nextxs"> <a href="1652839439.html" title="《扁鹊心书》卷中·淋证"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
