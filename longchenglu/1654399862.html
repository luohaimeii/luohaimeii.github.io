<!doctype html><html lang="zh-Hans"> <head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><title>《龙城录》武居常有身后名-虎思国学网</title><meta name="keywords" content="《龙城录》武居常有身后名"><meta name="description" content="《龙城录》武居常有身后名"><link rel="stylesheet" type="text/css" href="/statics/css/style.css"><link rel="shortcut icon" href="/statics/picture/favicon.ico" type="image/x-icon"><meta http-equiv="Cache-Control" content="no-transform"><meta http-equiv="Cache-Control" content="no-siteapp"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"><meta name="referrer" content="origin-when-cross-origin"><meta name="applicable-device" content="pc,mobile"><meta name="MobileOptimized" content="width"><meta name="HandheldFriendly" content="true"><meta name="renderer" content="webkit"><script type="text/javascript" src="/statics/js/home.js"></script></head> <body> <div class="header"> <div class="head"> <ul class="navbar-left"> <li> <a href="/"> <img src="/statics/picture/logo.png" class="logo" alt="国学经典"> </a> </li> <li class="index_sy"> <a href="/" title="首页"> 首页 </a> </li> <li> <a href="/jing/" title="经"> 经 </a> </li> <li> <a href="/shi/" title="史"> 史 </a> </li> <li> <a href="/zi/" title="子"> 子 </a> </li> <li> <a href="/ji/" title="集"> 集 </a> </li><li> <a href="/baike/" title="百科资料"> 百科</a> </li> </ul> <script type="text/javascript" src="/statics/js/navright.js"></script> </div> </div><div class="content"> <div class="xscontent"> <div class="wenztit"><h1> 卷五 武居常有身后名</h1></div> <div class="wenzabout"> <div class="nextxs"> <a href="1654399872.html" title="《龙城录》上帝追摄王远知易总"> ← 上一章 </a></div> <div class="fhmulu"><a href="longchenglu1.html" title="《龙城录》正文">章节目录</a></div> <div class="nextxs"> <a href="1654399851.html" title="《龙城录》房玄龄为相无嗣"> 下一章 → </a></div> </div> <div class="wenzbody"> 　　武居常天后高祖也，少时游洛下，人呼为猴颊郎，以居常颐下有须若猿颔也。其上有四靥，一曰伊水上遇一匄者曰：郎君当有身后名，面骨法当刑，然有女当八十年后起家暴贵，寻亦浸微。居常不信，后卒如言。匄者岂非异人乎。 </div> <div class="wenzabout"> <div class="nextxs"> <a href="1654399872.html" title="《龙城录》上帝追摄王远知易总"> ← 上一章 </a></div> <div class="fhmulu"><a href="longchenglu1.html" title="《龙城录》正文">章节目录</a></div> <div class="nextxs"> <a href="1654399851.html" title="《龙城录》房玄龄为相无嗣"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
