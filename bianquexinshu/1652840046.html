<!doctype html><html lang="zh-Hans"> <head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><title>《扁鹊心书》卷中·老人伤寒-虎思国学网</title><meta name="keywords" content="《扁鹊心书》卷中·老人伤寒"><meta name="description" content="《扁鹊心书》卷中·老人伤寒"><link rel="stylesheet" type="text/css" href="/statics/css/style.css"><link rel="shortcut icon" href="/statics/picture/favicon.ico" type="image/x-icon"><meta http-equiv="Cache-Control" content="no-transform"><meta http-equiv="Cache-Control" content="no-siteapp"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"><meta name="referrer" content="origin-when-cross-origin"><meta name="applicable-device" content="pc,mobile"><meta name="MobileOptimized" content="width"><meta name="HandheldFriendly" content="true"><meta name="renderer" content="webkit"><script type="text/javascript" src="/statics/js/home.js"></script></head> <body> <div class="header"> <div class="head"> <ul class="navbar-left"> <li> <a href="/"> <img src="/statics/picture/logo.png" class="logo" alt="国学经典"> </a> </li> <li class="index_sy"> <a href="/" title="首页"> 首页 </a> </li> <li> <a href="/jing/" title="经"> 经 </a> </li> <li> <a href="/shi/" title="史"> 史 </a> </li> <li> <a href="/zi/" title="子"> 子 </a> </li> <li> <a href="/ji/" title="集"> 集 </a> </li><li> <a href="/baike/" title="百科资料"> 百科</a> </li> </ul> <script type="text/javascript" src="/statics/js/navright.js"></script> </div> </div><div class="content"> <div class="xscontent"> <div class="wenztit"><h1> 卷十一 卷中·老人伤寒</h1></div> <div class="wenzabout"> <div class="nextxs"> <a href="1652840057.html" title="《扁鹊心书》卷中·阴毒"> ← 上一章 </a></div> <div class="fhmulu"><a href="bianquexinshu3.html" title="《扁鹊心书》卷中">章节目录</a></div> <div class="nextxs"> <a href="1652840035.html" title="《扁鹊心书》卷中·阴阳换气"> 下一章 → </a></div> </div> <div class="wenzbody"> <p>　　切忌发汗及吐下，盖元气盛，则邪不能为害，传遍经络自愈。仲景不敢补，反攻邪气，致正气受伤，误人多矣。凡遇此证，只用姜附汤多服，自然解散。（元虚而受攻伤正，何必老人，仲景医之圣者，宁不知此。）</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652840057.html" title="《扁鹊心书》卷中·阴毒"> ← 上一章 </a></div> <div class="fhmulu"><a href="bianquexinshu3.html" title="《扁鹊心书》卷中">章节目录</a></div> <div class="nextxs"> <a href="1652840035.html" title="《扁鹊心书》卷中·阴阳换气"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
