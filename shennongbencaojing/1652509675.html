>　　味咸平。</p> <p>　　主伤中脉绝，阴不起，强志益气，长肌肉，肥健，生子。</p> <p>　　眼，主惊痫，腹满，疟疾，当杀用之。</p> <p>　　悬蹄，主惊邪，瘈疭，乳难，辟恶气鬼毒蛊注，不祥，生平泽。</p> <p>　　《名医》曰：生云中。&nbsp;</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652509693.html" title="《神农本草经》中品·禽部·天鼠屎"> ← 上一章 </a></div> <div class="fhmulu"><a href="shennongbencaojing14.html" title="《神农本草经》中品·兽部">章节目录</a></div> <div class="nextxs"> <a href="1652509664.html" title="《神农本草经》中品·兽部·鹿茸"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
