<!doctype html><html lang="zh-Hans"> <head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><title>《明季北略》卷十·倪元璐请彻监军-虎思国学网</title><meta name="keywords" content="《明季北略》卷十·倪元璐请彻监军"><meta name="description" content="《明季北略》卷十·倪元璐请彻监军"><link rel="stylesheet" type="text/css" href="/statics/css/style.css"><link rel="shortcut icon" href="/statics/picture/favicon.ico" type="image/x-icon"><meta http-equiv="Cache-Control" content="no-transform"><meta http-equiv="Cache-Control" content="no-siteapp"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"><meta name="referrer" content="origin-when-cross-origin"><meta name="applicable-device" content="pc,mobile"><meta name="MobileOptimized" content="width"><meta name="HandheldFriendly" content="true"><meta name="renderer" content="webkit"><script type="text/javascript" src="/statics/js/home.js"></script></head> <body> <div class="header"> <div class="head"> <ul class="navbar-left"> <li> <a href="/"> <img src="/statics/picture/logo.png" class="logo" alt="国学经典"> </a> </li> <li class="index_sy"> <a href="/" title="首页"> 首页 </a> </li> <li> <a href="/jing/" title="经"> 经 </a> </li> <li> <a href="/shi/" title="史"> 史 </a> </li> <li> <a href="/zi/" title="子"> 子 </a> </li> <li> <a href="/ji/" title="集"> 集 </a> </li><li> <a href="/baike/" title="百科资料"> 百科</a> </li> </ul> <script type="text/javascript" src="/statics/js/navright.js"></script> </div> </div><div class="content"> <div class="xscontent"> <div class="wenztit"><h1>卷十·倪元璐请彻监军</h1></div> <div class="wenzabout"> <div class="nextxs"> <a href="1650591855.html" title="《明季北略》卷十·论罢监视太监"> ← 上一章 </a></div> <div class="fhmulu"><a href="mingjibeilue10.html" title="《明季北略》卷十">章节目录</a></div> <div class="nextxs"> <a href="1650591834.html" title="《明季北略》卷十·陈子壮与温体仁有隙"> 下一章 → </a></div> </div> <div class="wenzbody"> <p>　　十一月，侍读倪元璐上言：边臣之情，归命监军，无事禀成为恭，寇至推委百出，阳以号于人曰：吾不自由也。陛下何不信赏必罚，以待其后，而必使近习之人，试之锋镝。又使藉口迄用无成哉！始陛下曰行之有绩，即彻。今行之无绩，益宜彻。不听。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1650591855.html" title="《明季北略》卷十·论罢监视太监"> ← 上一章 </a></div> <div class="fhmulu"><a href="mingjibeilue10.html" title="《明季北略》卷十">章节目录</a></div> <div class="nextxs"> <a href="1650591834.html" title="《明季北略》卷十·陈子壮与温体仁有隙"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
