or:#af9100;">　　一个“信”字是人立身处世的根本，所以做人不能没有信用；一个“恕”字，是与他人交往时最重要的品德，所以应该终生奉行。</span></p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1651556401.html" title="《围炉夜话》第五则"> ← 上一章 </a></div> <div class="fhmulu"><a href="weiluyehua1.html" title="《围炉夜话》正文">章节目录</a></div> <div class="nextxs"> <a href="1651556382.html" title="《围炉夜话》第七则"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
