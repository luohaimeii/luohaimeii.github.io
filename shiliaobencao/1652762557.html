<!doctype html><html lang="zh-Hans"> <head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><title>《食疗本草》卷下·芥-虎思国学网</title><meta name="keywords" content="《食疗本草》卷下·芥"><meta name="description" content="《食疗本草》卷下·芥"><link rel="stylesheet" type="text/css" href="/statics/css/style.css"><link rel="shortcut icon" href="/statics/picture/favicon.ico" type="image/x-icon"><meta http-equiv="Cache-Control" content="no-transform"><meta http-equiv="Cache-Control" content="no-siteapp"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"><meta name="referrer" content="origin-when-cross-origin"><meta name="applicable-device" content="pc,mobile"><meta name="MobileOptimized" content="width"><meta name="HandheldFriendly" content="true"><meta name="renderer" content="webkit"><script type="text/javascript" src="/statics/js/home.js"></script></head> <body> <div class="header"> <div class="head"> <ul class="navbar-left"> <li> <a href="/"> <img src="/statics/picture/logo.png" class="logo" alt="国学经典"> </a> </li> <li class="index_sy"> <a href="/" title="首页"> 首页 </a> </li> <li> <a href="/jing/" title="经"> 经 </a> </li> <li> <a href="/shi/" title="史"> 史 </a> </li> <li> <a href="/zi/" title="子"> 子 </a> </li> <li> <a href="/ji/" title="集"> 集 </a> </li><li> <a href="/baike/" title="百科资料"> 百科</a> </li> </ul> <script type="text/javascript" src="/statics/js/navright.js"></script> </div> </div><div class="content"> <div class="xscontent"> <div class="wenztit"><h1> 卷四十七 卷下·芥</h1></div> <div class="wenzabout"> <div class="nextxs"> <a href="1652762567.html" title="《食疗本草》卷下·越瓜〈寒〉"> ← 上一章 </a></div> <div class="fhmulu"><a href="shiliaobencao3.html" title="《食疗本草》卷下">章节目录</a></div> <div class="nextxs"> <a href="1652762546.html" title="《食疗本草》卷下·萝卜（莱菔）〈冷〉"> 下一章 → </a></div> </div> <div class="wenzbody"> <p>　　（一）主咳逆下气，明目，去头面风。大叶者良。煮食之亦动气，犹胜诸菜。生食发丹石，不可多食。〔卷·心·嘉〕</p> <p>　　（二）其子∶微熬研之，作酱香美，有辛气，能通利五脏。〔证〕</p> <p>　　（三）其叶不可多食。又，细叶有毛者杀人。〔证〕</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652762567.html" title="《食疗本草》卷下·越瓜〈寒〉"> ← 上一章 </a></div> <div class="fhmulu"><a href="shiliaobencao3.html" title="《食疗本草》卷下">章节目录</a></div> <div class="nextxs"> <a href="1652762546.html" title="《食疗本草》卷下·萝卜（莱菔）〈冷〉"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
