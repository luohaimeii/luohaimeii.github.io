甘微温。</p> <p>　　主痈疽久败创，排脓止痛，大风，痢疾，五痔，鼠瘘，补虚，小儿百病。一名戴糁。生山谷。</p> <p>　　《名医》曰：一名戴椹，一名独椹，一名芰草，一名蜀脂，一名百本，生蜀郡白水汉中，二月十月采，阴干。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652507764.html" title="《神农本草经》上品·草部·蒺藜子"> ← 上一章 </a></div> <div class="fhmulu"><a href="shennongbencaojing2.html" title="《神农本草经》上品·草部">章节目录</a></div> <div class="nextxs"> <a href="1652507733.html" title="《神农本草经》上品·草部·肉松蓉"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
