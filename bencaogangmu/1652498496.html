>气味</strong><br>辛，平，有毒。</p> <p><strong>主治</strong><br>镇精神，坚骨髓，通五脏邪气，服之神仙。疗小儿惊伤五脏，风痫失志，镇心安魂。癫痫风热，上气咳嗽，伤寒肺损吐血，骨蒸劳极作渴，并以箔入丸散服。破冷气，除风。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652498515.html" title="《本草纲目》石部·汤瓶内硷"> ← 上一章 </a></div> <div class="fhmulu"><a href="bencaogangmu6.html" title="《本草纲目》金部">章节目录</a></div> <div class="nextxs"> <a href="1652498486.html" title="《本草纲目》金部·银"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
