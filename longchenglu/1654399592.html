之两大树上宛延而去。梦回上召申王圆兆王进曰：两木相也，二人名为天遣，龙致于树即姚崇宋璟当为辅相兆矣。上叹异之。 </div> <div class="wenzabout"> <div class="nextxs"> <a href="1654399603.html" title="《龙城录》明皇识射覆之术"> ← 上一章 </a></div> <div class="fhmulu"><a href="longchenglu1.html" title="《龙城录》正文">章节目录</a></div> <div class="nextxs"> <a href="1654399582.html" title="《龙城录》太宗沉书于滹沱"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
