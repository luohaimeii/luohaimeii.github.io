/p> <p>阐述了造园观点，绘制了235幅造墙、铺地、造门窗等图案。既有实践总结，也有对园林艺术的见解和论述。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="/yizhoushuangji/1653103579.html" title="《艺舟双楫》版本"> ← 上一章 </a></div> <div class="fhmulu"><a href="yuanyebaike.html" title="《园冶》百科">章节目录</a></div> <div class="nextxs"> <a href="1653103517.html" title="《园冶》作者"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
