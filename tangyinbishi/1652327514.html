<!doctype html><html lang="zh-Hans"> <head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><title>《棠阴比事》安礼神明-虎思国学网</title><meta name="keywords" content="《棠阴比事》安礼神明"><meta name="description" content="《棠阴比事》安礼神明"><link rel="stylesheet" type="text/css" href="/statics/css/style.css"><link rel="shortcut icon" href="/statics/picture/favicon.ico" type="image/x-icon"><meta http-equiv="Cache-Control" content="no-transform"><meta http-equiv="Cache-Control" content="no-siteapp"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"><meta name="referrer" content="origin-when-cross-origin"><meta name="applicable-device" content="pc,mobile"><meta name="MobileOptimized" content="width"><meta name="HandheldFriendly" content="true"><meta name="renderer" content="webkit"><script type="text/javascript" src="/statics/js/home.js"></script></head> <body> <div class="header"> <div class="head"> <ul class="navbar-left"> <li> <a href="/"> <img src="/statics/picture/logo.png" class="logo" alt="国学经典"> </a> </li> <li class="index_sy"> <a href="/" title="首页"> 首页 </a> </li> <li> <a href="/jing/" title="经"> 经 </a> </li> <li> <a href="/shi/" title="史"> 史 </a> </li> <li> <a href="/zi/" title="子"> 子 </a> </li> <li> <a href="/ji/" title="集"> 集 </a> </li><li> <a href="/baike/" title="百科资料"> 百科</a> </li> </ul> <script type="text/javascript" src="/statics/js/navright.js"></script> </div> </div><div class="content"> <div class="xscontent"> <div class="wenztit"><h1> 卷一百零二 安礼神明</h1></div> <div class="wenzabout"> <div class="nextxs"> <a href="1652327524.html" title="《棠阴比事》陈睦酷报"> ← 上一章 </a></div> <div class="fhmulu"><a href="tangyinbishi1.html" title="《棠阴比事》正文">章节目录</a></div> <div class="nextxs"> <a href="1652327503.html" title="《棠阴比事》文原雨旱"> 下一章 → </a></div> </div> <div class="wenzbody"> <p>　　王公固明敏，然非用心何以能此　　王安礼知开封，逻者得匿告人不轨书，上命治之。验所指略问，后加二人有薛姓者，安礼曰：得之矣。召薛曰：若仇乎？曰：有售笔者，固拒之，怏怏而去。乃即命捕讯，果得所为。枭其首。人称为神。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652327524.html" title="《棠阴比事》陈睦酷报"> ← 上一章 </a></div> <div class="fhmulu"><a href="tangyinbishi1.html" title="《棠阴比事》正文">章节目录</a></div> <div class="nextxs"> <a href="1652327503.html" title="《棠阴比事》文原雨旱"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
