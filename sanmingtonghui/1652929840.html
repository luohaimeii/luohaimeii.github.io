<!doctype html><html lang="zh-Hans"> <head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><title>《三命通会》卷五·天福贵人-虎思国学网</title><meta name="keywords" content="《三命通会》卷五·天福贵人"><meta name="description" content="《三命通会》卷五·天福贵人"><link rel="stylesheet" type="text/css" href="/statics/css/style.css"><link rel="shortcut icon" href="/statics/picture/favicon.ico" type="image/x-icon"><meta http-equiv="Cache-Control" content="no-transform"><meta http-equiv="Cache-Control" content="no-siteapp"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"><meta name="referrer" content="origin-when-cross-origin"><meta name="applicable-device" content="pc,mobile"><meta name="MobileOptimized" content="width"><meta name="HandheldFriendly" content="true"><meta name="renderer" content="webkit"><script type="text/javascript" src="/statics/js/home.js"></script></head> <body> <div class="header"> <div class="head"> <ul class="navbar-left"> <li> <a href="/"> <img src="/statics/picture/logo.png" class="logo" alt="国学经典"> </a> </li> <li class="index_sy"> <a href="/" title="首页"> 首页 </a> </li> <li> <a href="/jing/" title="经"> 经 </a> </li> <li> <a href="/shi/" title="史"> 史 </a> </li> <li> <a href="/zi/" title="子"> 子 </a> </li> <li> <a href="/ji/" title="集"> 集 </a> </li><li> <a href="/baike/" title="百科资料"> 百科</a> </li> </ul> <script type="text/javascript" src="/statics/js/navright.js"></script> </div> </div><div class="content"> <div class="xscontent"> <div class="wenztit"><h1>卷五·天福贵人</h1></div> <div class="wenzabout"> <div class="nextxs"> <a href="1652929851.html" title="《三命通会》卷五·论正官"> ← 上一章 </a></div> <div class="fhmulu"><a href="sanmingtonghui5.html" title="《三命通会》卷五">章节目录</a></div> <div class="nextxs"> <a href="1652929830.html" title="《三命通会》卷五·天元作禄"> 下一章 → </a></div> </div> <div class="wenzbody"> <p>　　谓官星坐处，见禄如人，有官有禄，莫非天福。甲生人以辛为官，辛禄在酉，是以甲人见酉，乙人见申之例。甲用辛官，柱有辛酉，更得福神助之，生旺有气为佳。一名禄干福神，遇者主科名巍峨，官职尊崇，多掌丝纶文翰之美。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652929851.html" title="《三命通会》卷五·论正官"> ← 上一章 </a></div> <div class="fhmulu"><a href="sanmingtonghui5.html" title="《三命通会》卷五">章节目录</a></div> <div class="nextxs"> <a href="1652929830.html" title="《三命通会》卷五·天元作禄"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
