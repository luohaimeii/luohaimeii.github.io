e="color:#af9100;">　　兄弟只见彼此为师友，伦常之乐的极致就是如此。家规如朝廷一般严谨，由此可知家法严厉。</span></p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1651554545.html" title="《围炉夜话》第二ＯＯ则"> ← 上一章 </a></div> <div class="fhmulu"><a href="weiluyehua1.html" title="《围炉夜话》正文">章节目录</a></div> <div class="nextxs"> <a href="1651554526.html" title="《围炉夜话》第二Ｏ二则"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
