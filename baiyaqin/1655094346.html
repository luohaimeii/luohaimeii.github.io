逸民恬淡闲旷者，有若健将忠壮激烈者，有若仙人绰约靖深者，有若神人变化不可测者，余自知如此，未知或者知我何如也。噫，三千年后，必有扬子云。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1655094357.html" title="《伯牙琴》代旌德观祭先贤文"> ← 上一章 </a></div> <div class="fhmulu"><a href="baiyaqin1.html" title="《伯牙琴》正文">章节目录</a></div> <div class="nextxs"> <a href="1655094336.html" title="《伯牙琴》补遗：冲天观记"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
