何以知人夏月得病，诸阳入阴也。 何以知人春得病，无肝脉也。无心脉，夏得病。无肺脉，秋得病。无肾脉，冬得病。无脾脉，四季之月得病。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652585818.html" title="《千金方》脉法·阴阳表里虚实第八"> ← 上一章 </a></div> <div class="fhmulu"><a href="qianjinfang30.html" title="《千金方》脉法">章节目录</a></div> <div class="nextxs"> <a href="1652585797.html" title="《千金方》脉法·扁鹊华佗察声色要诀第十"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
