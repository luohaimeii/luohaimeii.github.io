太宗命杜如晦掌之。如晦复禀上当如何，太宗曰付诸曹吏行。顷闻于外有大臣将自尽者，上乃复取文书背裹一物疑石重上亲里百重命中使沉滹沱中更不复省。此与光武焚交谤数千章者何异。 </div> <div class="wenzabout"> <div class="nextxs"> <a href="1654399592.html" title="《龙城录》明皇梦姚宋当为相"> ← 上一章 </a></div> <div class="fhmulu"><a href="longchenglu1.html" title="《龙城录》正文">章节目录</a></div> <div class="nextxs"> <a href="1654399572.html" title="《龙城录》尹知章梦持巨凿破其腹"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
