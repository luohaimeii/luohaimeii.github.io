　谨按《周礼》：“籥师氏掌教国子吹钥。”《诗》云：“以籥不僣。”乐之器竹管三孔，所以和众声也。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1653617538.html" title="《风俗演义》卷六·竽"> ← 上一章 </a></div> <div class="fhmulu"><a href="fengsuyanyi6.html" title="《风俗演义》卷六">章节目录</a></div> <div class="nextxs"> <a href="1653617518.html" title="《风俗演义》卷六·鹿"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
