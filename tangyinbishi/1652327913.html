者出榜，虚称被盗，失所质银铤等物，召人缉首。不日间果有人来赎银，执之伏罪。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652327923.html" title="《棠阴比事》宗裔卷?"> ← 上一章 </a></div> <div class="fhmulu"><a href="tangyinbishi1.html" title="《棠阴比事》正文">章节目录</a></div> <div class="nextxs"> <a href="1652327902.html" title="《棠阴比事》道让诈囚"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
