<!doctype html><html lang="zh-Hans"> <head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><title>《本草纲目》菜部·葫-虎思国学网</title><meta name="keywords" content="《本草纲目》菜部·葫"><meta name="description" content="《本草纲目》菜部·葫"><link rel="stylesheet" type="text/css" href="/statics/css/style.css"><link rel="shortcut icon" href="/statics/picture/favicon.ico" type="image/x-icon"><meta http-equiv="Cache-Control" content="no-transform"><meta http-equiv="Cache-Control" content="no-siteapp"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"><meta name="referrer" content="origin-when-cross-origin"><meta name="applicable-device" content="pc,mobile"><meta name="MobileOptimized" content="width"><meta name="HandheldFriendly" content="true"><meta name="renderer" content="webkit"><script type="text/javascript" src="/statics/js/home.js"></script></head> <body> <div class="header"> <div class="head"> <ul class="navbar-left"> <li> <a href="/"> <img src="/statics/picture/logo.png" class="logo" alt="国学经典"> </a> </li> <li class="index_sy"> <a href="/" title="首页"> 首页 </a> </li> <li> <a href="/jing/" title="经"> 经 </a> </li> <li> <a href="/shi/" title="史"> 史 </a> </li> <li> <a href="/zi/" title="子"> 子 </a> </li> <li> <a href="/ji/" title="集"> 集 </a> </li><li> <a href="/baike/" title="百科资料"> 百科</a> </li> </ul> <script type="text/javascript" src="/statics/js/navright.js"></script> </div> </div><div class="content"> <div class="xscontent"> <div class="wenztit"><h1> 卷六 菜部·葫</h1></div> <div class="wenzabout"> <div class="nextxs"> <a href="1652503380.html" title="《本草纲目》菜部·蒜"> ← 上一章 </a></div> <div class="fhmulu"><a href="bencaogangmu10.html" title="《本草纲目》菜部">章节目录</a></div> <div class="nextxs"> <a href="1652503360.html" title="《本草纲目》菜部·芸薹"> 下一章 → </a></div> </div> <div class="wenzbody"> <p><strong>释名</strong><br>大蒜、茆蒜、荤菜。今人谓葫为大蒜，蒜为小蒜，以其气类相似也。</p> <p><strong>气味</strong><br>（根）辛、温、有毒。久食损人目。</p> <p><strong>主治</strong><br>归五脏，散痈肿除风邪，杀毒气。下气，消谷，化肉。</p> <p><strong>附方</strong><br>肠毒下血。蒜连丸：用独蒜煨捣，和黄连末为丸，日日米汤服之。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652503380.html" title="《本草纲目》菜部·蒜"> ← 上一章 </a></div> <div class="fhmulu"><a href="bencaogangmu10.html" title="《本草纲目》菜部">章节目录</a></div> <div class="nextxs"> <a href="1652503360.html" title="《本草纲目》菜部·芸薹"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
