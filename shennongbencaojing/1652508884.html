 <p>　　味辛平。</p> <p>　　主恶创头秃痂疥，杀毒虫虱，身痒，邪气诸毒。炼之，久服，轻身增年不老。生山谷。</p> <p>　　《名医》曰：生武都，与雄黄同山生，其阴山有金，金精熏，则生雌黄，采无时。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652508894.html" title="《神农本草经》中品·玉石部·石流黄"> ← 上一章 </a></div> <div class="fhmulu"><a href="shennongbencaojing11.html" title="《神农本草经》中品·玉石部">章节目录</a></div> <div class="nextxs"> <a href="1652508874.html" title="《神农本草经》中品·玉石部·水银"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
