其言围何？疾重故也。</p> <p>　　二、夏五月庚寅，宋公慈父卒。</p> <p>　　何以不书葬？盈乎讳也。</p> <p>　　三、秋，楚人伐陈。</p> <p>　　四、冬十有一月，杞子卒。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1649994550.html" title="《公羊传》僖公·二十二年"> ← 上一章 </a></div> <div class="fhmulu"><a href="gongyangzhuan5.html" title="《公羊传》僖公">章节目录</a></div> <div class="nextxs"> <a href="1649994529.html" title="《公羊传》僖公·二十四年"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
