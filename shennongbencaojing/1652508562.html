<p>　　味咸平。</p> <p>　　主漏下赤白，破症瘕，痎疟，五痔，阴蚀，湿痹，四肢重弱，小儿囟不合。久服，轻身不饥。一名神屋。生池泽。</p> <p>　　《名医》曰：生南海及湖水中，采无时。</p> <p>　　案《广雅》云：介，龟也。高诱注淮南云：龟壳，龟甲也。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652508572.html" title="《神农本草经》上品·虫鱼部·牡蛎"> ← 上一章 </a></div> <div class="fhmulu"><a href="shennongbencaojing7.html" title="《神农本草经》上品·虫鱼部">章节目录</a></div> <div class="nextxs"> <a href="1652508551.html" title="《神农本草经》上品·虫鱼部·桑蜱蛸"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
