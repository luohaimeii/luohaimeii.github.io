<!doctype html><html lang="zh-Hans"> <head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><title>《扁鹊心书》卷下·吐泻-虎思国学网</title><meta name="keywords" content="《扁鹊心书》卷下·吐泻"><meta name="description" content="《扁鹊心书》卷下·吐泻"><link rel="stylesheet" type="text/css" href="/statics/css/style.css"><link rel="shortcut icon" href="/statics/picture/favicon.ico" type="image/x-icon"><meta http-equiv="Cache-Control" content="no-transform"><meta http-equiv="Cache-Control" content="no-siteapp"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"><meta name="referrer" content="origin-when-cross-origin"><meta name="applicable-device" content="pc,mobile"><meta name="MobileOptimized" content="width"><meta name="HandheldFriendly" content="true"><meta name="renderer" content="webkit"><script type="text/javascript" src="/statics/js/home.js"></script></head> <body> <div class="header"> <div class="head"> <ul class="navbar-left"> <li> <a href="/"> <img src="/statics/picture/logo.png" class="logo" alt="国学经典"> </a> </li> <li class="index_sy"> <a href="/" title="首页"> 首页 </a> </li> <li> <a href="/jing/" title="经"> 经 </a> </li> <li> <a href="/shi/" title="史"> 史 </a> </li> <li> <a href="/zi/" title="子"> 子 </a> </li> <li> <a href="/ji/" title="集"> 集 </a> </li><li> <a href="/baike/" title="百科资料"> 百科</a> </li> </ul> <script type="text/javascript" src="/statics/js/navright.js"></script> </div> </div><div class="content"> <div class="xscontent"> <div class="wenztit"><h1> 卷四十一 卷下·吐泻</h1></div> <div class="wenzabout"> <div class="nextxs"> <a href="1652840318.html" title="《扁鹊心书》卷下·小儿午后潮热"> ← 上一章 </a></div> <div class="fhmulu"><a href="bianquexinshu4.html" title="《扁鹊心书》卷下">章节目录</a></div> <div class="nextxs"> <a href="1652840297.html" title="《扁鹊心书》卷下·面目浮肿"> 下一章 → </a></div> </div> <div class="wenzbody"> <p>　　小儿吐泻因伤食者，用珍珠散；因胃寒者，用姜附汤，吐泻脉沉细，手足冷者，灸脐下一百五十壮；慢惊吐泻灸中脘五十壮。（人家肯用姜附，小儿亦已幸矣，若灼艾至一百五十壮，以此法劝之，断乎不允，只索托之空言耳。）</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652840318.html" title="《扁鹊心书》卷下·小儿午后潮热"> ← 上一章 </a></div> <div class="fhmulu"><a href="bianquexinshu4.html" title="《扁鹊心书》卷下">章节目录</a></div> <div class="nextxs"> <a href="1652840297.html" title="《扁鹊心书》卷下·面目浮肿"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
