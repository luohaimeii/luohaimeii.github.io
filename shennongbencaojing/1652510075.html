<p><br>　　味辛微寒。</p> <p>　　主土逆胃反，惊痫瘨疾，除热下气，炼化还成九光。久服通神明（《御览》引作吐下，云久服成仙）。生平泽。</p> <p>　　《名医》曰：一名铅华，生蜀郡。</p> <p>　　案《说文》云：铅，青金也。陶宏景云：即今熬铅所作黄丹也。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652510086.html" title="《神农本草经》下品·玉石部·礜石"> ← 上一章 </a></div> <div class="fhmulu"><a href="shennongbencaojing20.html" title="《神农本草经》下品·玉石部">章节目录</a></div> <div class="nextxs"> <a href="1652510065.html" title="《神农本草经》下品·玉石部·粉锡"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
