<!doctype html><html lang="zh-Hans"> <head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><title>《博物志》序-虎思国学网</title><meta name="keywords" content="《博物志》序"><meta name="description" content="《博物志》序"><link rel="stylesheet" type="text/css" href="/statics/css/style.css"><link rel="shortcut icon" href="/statics/picture/favicon.ico" type="image/x-icon"><meta http-equiv="Cache-Control" content="no-transform"><meta http-equiv="Cache-Control" content="no-siteapp"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"><meta name="referrer" content="origin-when-cross-origin"><meta name="applicable-device" content="pc,mobile"><meta name="MobileOptimized" content="width"><meta name="HandheldFriendly" content="true"><meta name="renderer" content="webkit"><script type="text/javascript" src="/statics/js/home.js"></script></head> <body> <div class="header"> <div class="head"> <ul class="navbar-left"> <li> <a href="/"> <img src="/statics/picture/logo.png" class="logo" alt="国学经典"> </a> </li> <li class="index_sy"> <a href="/" title="首页"> 首页 </a> </li> <li> <a href="/jing/" title="经"> 经 </a> </li> <li> <a href="/shi/" title="史"> 史 </a> </li> <li> <a href="/zi/" title="子"> 子 </a> </li> <li> <a href="/ji/" title="集"> 集 </a> </li><li> <a href="/baike/" title="百科资料"> 百科</a> </li> </ul> <script type="text/javascript" src="/statics/js/navright.js"></script> </div> </div><div class="content"> <div class="xscontent"> <div class="wenztit"><h1>序</h1></div> <div class="wenzabout"> <div class="nextxs"> <a href="/taipingguangji/1653889901.html" title="《太平广记》编者简介"> ← 上一章 </a></div> <div class="fhmulu"><a href="bowuzhi1.html" title="《博物志》正文">章节目录</a></div> <div class="nextxs"> <a href="1653886800.html" title="《博物志》卷一"> 下一章 → </a></div> </div> <div class="wenzbody"> <p>　　余视《山海经》及《禹贡》、《尔雅》、《说文》、地志，虽曰悉备，各有所不载者，作略说。出所不见，粗言远方，陈山川位象，吉凶有征。诸国境界，犬牙相入。春秋之后，并相侵伐。其土地不可具详，其山川地泽，略而言之，正国十二。博物之士，览而鉴焉。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="/taipingguangji/1653889901.html" title="《太平广记》编者简介"> ← 上一章 </a></div> <div class="fhmulu"><a href="bowuzhi1.html" title="《博物志》正文">章节目录</a></div> <div class="nextxs"> <a href="1653886800.html" title="《博物志》卷一"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
