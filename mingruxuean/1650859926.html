nzbody"> <p>　　谢祐字天锡，南海人。白沙弟子。筑室葵山之下，并日而食，袜不掩胫，名利之事，纤毫不能入也。尝寄甘泉诗云：“生从何处来，化从何处去。化化与生生，便是真元处。”卒后附祀於白沙。按先生之诗，未免竟是禅学，与白沙有毫釐之差。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1650859936.html" title="《明儒学案》白沙学案下·布衣李抱真先生孔修"> ← 上一章 </a></div> <div class="fhmulu"><a href="mingruxuean4.html" title="《明儒学案》白沙学案下">章节目录</a></div> <div class="nextxs"> <a href="1650859915.html" title="《明儒学案》白沙学案下·文学何时振先生廷矩"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
