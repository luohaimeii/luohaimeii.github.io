泽。<br><span style="color:#af9100;">　　地理位置受到限制，形势发展受到阻碍，攻取附近的地方，就有利；攻击远隔的地方，就有害。火焰是向上事的，河水永远是向低洼处流淌的，万事发展变化全是如此。</span></p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1651990465.html" title="《三十六计》混战计·关门捉贼"> ← 上一章 </a></div> <div class="fhmulu"><a href="sanshiliuji4.html" title="《三十六计》混战计">章节目录</a></div> <div class="nextxs"> <a href="1651990446.html" title="《三十六计》混战计·假道伐虢"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
