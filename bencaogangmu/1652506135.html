 <p><strong>气味</strong><br>主治鹗骨可用来接骨。取骨烧存性，另以铜钱一个，煅药，醋淬七次，取末与骨灰等分，酒送服一钱，不可过多。作因身体下段，空心服；在上段，饭后服。极有效验。服药前，须用木板反伤处绑定。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652506146.html" title="《本草纲目》禽部·鹅"> ← 上一章 </a></div> <div class="fhmulu"><a href="bencaogangmu16.html" title="《本草纲目》禽部">章节目录</a></div> <div class="nextxs"> <a href="1652506125.html" title="《本草纲目》禽部·鹜"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
