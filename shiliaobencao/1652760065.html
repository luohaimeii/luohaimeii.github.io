>　　（一）堪食之，其皮不任药用。初未霜时，亦酸。及得霜后，方即甜美。故名之曰甘。〔心·证〕</p> <p>　　（二）利肠胃热毒，下丹石，（止暴）渴。食多令人肺燥，冷中，发流癖病也。〔心·证〕</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652760075.html" title="《食疗本草》卷上·荔枝〈微温〉"> ← 上一章 </a></div> <div class="fhmulu"><a href="shiliaobencao1.html" title="《食疗本草》卷上">章节目录</a></div> <div class="nextxs"> <a href="1652760054.html" title="《食疗本草》卷上·甘蔗"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
