<!doctype html><html lang="zh-Hans"> <head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><title>《高士传》卷中·黔娄先生-虎思国学网</title><meta name="keywords" content="《高士传》卷中·黔娄先生"><meta name="description" content="《高士传》卷中·黔娄先生"><link rel="stylesheet" type="text/css" href="/statics/css/style.css"><link rel="shortcut icon" href="/statics/picture/favicon.ico" type="image/x-icon"><meta http-equiv="Cache-Control" content="no-transform"><meta http-equiv="Cache-Control" content="no-siteapp"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"><meta name="referrer" content="origin-when-cross-origin"><meta name="applicable-device" content="pc,mobile"><meta name="MobileOptimized" content="width"><meta name="HandheldFriendly" content="true"><meta name="renderer" content="webkit"><script type="text/javascript" src="/statics/js/home.js"></script></head> <body> <div class="header"> <div class="head"> <ul class="navbar-left"> <li> <a href="/"> <img src="/statics/picture/logo.png" class="logo" alt="国学经典"> </a> </li> <li class="index_sy"> <a href="/" title="首页"> 首页 </a> </li> <li> <a href="/jing/" title="经"> 经 </a> </li> <li> <a href="/shi/" title="史"> 史 </a> </li> <li> <a href="/zi/" title="子"> 子 </a> </li> <li> <a href="/ji/" title="集"> 集 </a> </li><li> <a href="/baike/" title="百科资料"> 百科</a> </li> </ul> <script type="text/javascript" src="/statics/js/navright.js"></script> </div> </div><div class="content"> <div class="xscontent"> <div class="wenztit"><h1> 卷十一 卷中·黔娄先生</h1></div> <div class="wenzabout"> <div class="nextxs"> <a href="1650862929.html" title="《高士传》卷中·颜斶"> ← 上一章 </a></div> <div class="fhmulu"><a href="gaoshizhuan3.html" title="《高士传》卷中">章节目录</a></div> <div class="nextxs"> <a href="1650862908.html" title="《高士传》卷中·陈仲子"> 下一章 → </a></div> </div> <div class="wenzbody"> <p>　　黔娄先生者，齐人也，修身清节，不求进於诸侯。鲁恭公闻其贤，遣使致礼，赐粟三千钟，欲以为相，辞不受。齐王又礼之，以黄金百斤聘为卿，又不就。著书四篇，言道家之务，号《黔娄子》，终身不屈，以寿终。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1650862929.html" title="《高士传》卷中·颜斶"> ← 上一章 </a></div> <div class="fhmulu"><a href="gaoshizhuan3.html" title="《高士传》卷中">章节目录</a></div> <div class="nextxs"> <a href="1650862908.html" title="《高士传》卷中·陈仲子"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
