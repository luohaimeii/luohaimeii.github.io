止蛊。<br><span style="color:#af9100;">　　保存阵地已有的战斗形貌，造成强大的声势，使友军不怀疑，敌人也不敢贸然进犯，而我却可以隐蔽地抽走精锐部队去袭击别处的敌军。</span></p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1651990484.html" title="《三十六计》混战计·混水摸鱼"> ← 上一章 </a></div> <div class="fhmulu"><a href="sanshiliuji4.html" title="《三十六计》混战计">章节目录</a></div> <div class="nextxs"> <a href="1651990465.html" title="《三十六计》混战计·关门捉贼"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
