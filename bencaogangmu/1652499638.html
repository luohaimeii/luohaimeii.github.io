> <p><strong>主治</strong><br>小儿惊热。用钩藤一两、硝石半两，甘草（炙）一分，共研为末。每服半钱，温水服，一天服三次。此方名“延龄散”。<br>班疹。用钩藤的钩子、紫草茸，等分为末。每服三分或半钱，温酒送下。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652499648.html" title="《本草纲目》草部·石松"> ← 上一章 </a></div> <div class="fhmulu"><a href="bencaogangmu8.html" title="《本草纲目》草部">章节目录</a></div> <div class="nextxs"> <a href="1652499627.html" title="《本草纲目》草部·白英"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
