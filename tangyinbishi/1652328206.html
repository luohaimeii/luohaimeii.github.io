<!doctype html><html lang="zh-Hans"> <head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><title>《棠阴比事》江分表里-虎思国学网</title><meta name="keywords" content="《棠阴比事》江分表里"><meta name="description" content="《棠阴比事》江分表里"><link rel="stylesheet" type="text/css" href="/statics/css/style.css"><link rel="shortcut icon" href="/statics/picture/favicon.ico" type="image/x-icon"><meta http-equiv="Cache-Control" content="no-transform"><meta http-equiv="Cache-Control" content="no-siteapp"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"><meta name="referrer" content="origin-when-cross-origin"><meta name="applicable-device" content="pc,mobile"><meta name="MobileOptimized" content="width"><meta name="HandheldFriendly" content="true"><meta name="renderer" content="webkit"><script type="text/javascript" src="/statics/js/home.js"></script></head> <body> <div class="header"> <div class="head"> <ul class="navbar-left"> <li> <a href="/"> <img src="/statics/picture/logo.png" class="logo" alt="国学经典"> </a> </li> <li class="index_sy"> <a href="/" title="首页"> 首页 </a> </li> <li> <a href="/jing/" title="经"> 经 </a> </li> <li> <a href="/shi/" title="史"> 史 </a> </li> <li> <a href="/zi/" title="子"> 子 </a> </li> <li> <a href="/ji/" title="集"> 集 </a> </li><li> <a href="/baike/" title="百科资料"> 百科</a> </li> </ul> <script type="text/javascript" src="/statics/js/navright.js"></script> </div> </div><div class="content"> <div class="xscontent"> <div class="wenztit"><h1> 卷三十六 江分表里</h1></div> <div class="wenzabout"> <div class="nextxs"> <a href="1652328217.html" title="《棠阴比事》思兢诈客"> ← 上一章 </a></div> <div class="fhmulu"><a href="tangyinbishi1.html" title="《棠阴比事》正文">章节目录</a></div> <div class="nextxs"> <a href="1652328196.html" title="《棠阴比事》章辨朱墨"> 下一章 → </a></div> </div> <div class="wenzbody"> <p>　　陵州仁寿县有里胥洪氏，利邻人田，绐之曰：我为收若税，免若役。邻人喜刬其税，归之。逾二十年，且伪为劵，以茶染纸，类远年者，讼之于县。县令江某郎中取纸卷展开视之，曰：若远年纸，里当色白。今表里如一，伪也。讯之果服。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652328217.html" title="《棠阴比事》思兢诈客"> ← 上一章 </a></div> <div class="fhmulu"><a href="tangyinbishi1.html" title="《棠阴比事》正文">章节目录</a></div> <div class="nextxs"> <a href="1652328196.html" title="《棠阴比事》章辨朱墨"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
