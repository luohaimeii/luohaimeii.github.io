　　治外感如将（兵贵神速，机圆法活，去邪务尽，善后务细，盖早平一日，则人少受一日之害）；治内伤如相（坐镇从容，神机默运，无功可言，无德可见，而人登寿域）。治上焦如羽（非轻不举）；治中焦如衡（非平不安）；治下焦如权（非重不沉）。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652853965.html" title="《温病条辨》卷四·杂说·外感总数论"> ← 上一章 </a></div> <div class="fhmulu"><a href="wenbingtiaobian4.html" title="《温病条辨》卷四·杂说">章节目录</a></div> <div class="nextxs"> <a href="1652853944.html" title="《温病条辨》卷四·杂说·吴又可温病禁黄连论"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
