style="color:#af9100;">　　严谨地遵守父兄的教诲，待人笃实谦虚，就是一个敦厚的好子弟。不擅自修改祖宗先辈遗留下来的治家之道，忠诚淳朴、勤劳省简持家，就一定会成为历久不衰的人家。</span></p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1651555812.html" title="《围炉夜话》第六七则"> ← 上一章 </a></div> <div class="fhmulu"><a href="weiluyehua1.html" title="《围炉夜话》正文">章节目录</a></div> <div class="nextxs"> <a href="1651555793.html" title="《围炉夜话》第六九则"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
