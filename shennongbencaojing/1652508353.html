。</p> <p>　　主疽，恶创头疡，白秃，疥搔，风气，五藏，除热。久服，轻身不老，延年。一名松膏，一名松肪。生山谷。</p> <p>　　《名医》曰：生太山，六月采。</p> <p>　　案《说文》云：松木也，或作；《范子计然》云：松脂出陇西，松胶者善。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652508363.html" title="《神农本草经》上品·木部·菌桂"> ← 上一章 </a></div> <div class="fhmulu"><a href="shennongbencaojing3.html" title="《神农本草经》上品·木部">章节目录</a></div> <div class="nextxs"> <a href="1652508342.html" title="《神农本草经》上品·木部·槐实"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
