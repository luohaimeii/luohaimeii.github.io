蛾出时，切不可取拗，令蛾子青烂。蚕妇亦忌食。野苦 五六回拗后，味甘滑于家苦 ，甚佳。〔嘉补〕</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652762171.html" title="《食疗本草》卷下·菠（菠菜）"> ← 上一章 </a></div> <div class="fhmulu"><a href="shiliaobencao3.html" title="《食疗本草》卷下">章节目录</a></div> <div class="nextxs"> <a href="1652762150.html" title="《食疗本草》卷下·鹿角菜"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
