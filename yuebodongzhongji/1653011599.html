肉者，足富。颏中有蚕者，限外有余，寿命七十有三。勒腰蚕者，七十八，不固，减三年。八九十者，看余限丰满也。颏下旋生□肉在颏骨下，必主近有权也。 </div> <div class="wenzabout"> <div class="nextxs"> <a href="1653011609.html" title="《月波洞中记》卷上·上下唇二十年"> ← 上一章 </a></div> <div class="fhmulu"><a href="yuebodongzhongji2.html" title="《月波洞中记》卷上">章节目录</a></div> <div class="nextxs"> <a href="1653011581.html" title="《月波洞中记》序·原序"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
