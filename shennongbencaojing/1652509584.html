　味苦平。</p> <p>　　主咳逆上气溢筋急，恶疡，杀小虫。</p> <p>　　根，作汤，益气止渴，补虚下气。</p> <p>　　汁，主风痓.实，通神明，轻身益气。</p> <p>　　《名医》曰：生益州。</p> <p>　　案《说文》云：竹，冬生草也，象形，下者，箁，箬也。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652509594.html" title="《神农本草经》中品·木部·桑根白皮"> ← 上一章 </a></div> <div class="fhmulu"><a href="shennongbencaojing13.html" title="《神农本草经》中品·木部">章节目录</a></div> <div class="nextxs"> <a href="1652509573.html" title="《神农本草经》中品·木部·吴茱萸"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
