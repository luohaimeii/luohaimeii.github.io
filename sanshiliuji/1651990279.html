以《损》推演。<br><span style="color:#af9100;">　　敌人的情况已经明了，盟友的态度还在犹豫，这时应极力设法诱使盟友去攻打敌人，来保存自己的实力。这是从《周易&#183;损》卦推演出的计策。</span></p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1651990289.html" title="《三十六计》胜战计·围魏救赵"> ← 上一章 </a></div> <div class="fhmulu"><a href="sanshiliuji1.html" title="《三十六计》胜战计">章节目录</a></div> <div class="nextxs"> <a href="1651990270.html" title="《三十六计》胜战计·以逸待劳"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
