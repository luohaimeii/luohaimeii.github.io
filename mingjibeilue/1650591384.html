工二部钱粮。初，上既罢诸内臣，外事悉委督抚，然上英察，辄以法随之，多不称任使。二年，大清兵南下，京师戒严，乃复以内臣视行营，自是衔宪四出，动以上官威倨，加于庶司，群相壅蔽矣。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1650591395.html" title="《明季北略》卷七·吴执御论周延儒"> ← 上一章 </a></div> <div class="fhmulu"><a href="mingjibeilue7.html" title="《明季北略》卷七">章节目录</a></div> <div class="nextxs"> <a href="1650591374.html" title="《明季北略》卷七·吴牲赈抚"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
