夫人遣鸟使召我矣。急备后事，某日当死。”至日果卒。殡日鸦复至，随槥缓飞，由苑之新。及殡，鸦始不见。长山吴木欣目睹之。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1653796621.html" title="《聊斋志异》卷十二·土化兔"> ← 上一章 </a></div> <div class="fhmulu"><a href="liaozhaizhiyi12.html" title="《聊斋志异》卷十二">章节目录</a></div> <div class="nextxs"> <a href="1653796600.html" title="《聊斋志异》卷十二·姬生"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
