以鸡，先以爪抟而吹之。一吹，则毛尽落如扫，亦理之奇也。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1653791585.html" title="《聊斋志异》卷五·孝子"> ← 上一章 </a></div> <div class="fhmulu"><a href="liaozhaizhiyi5.html" title="《聊斋志异》卷五">章节目录</a></div> <div class="nextxs"> <a href="1653791564.html" title="《聊斋志异》卷五·阎王"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
