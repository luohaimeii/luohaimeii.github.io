璧友心若臭兰人者。使夫婉儿稍知义训，亦足为贤妇人而称量天下何足道哉。此祸成所以无赦于死也。有文集一百卷行于世。 </div> <div class="wenzabout"> <div class="nextxs"> <a href="1654399572.html" title="《龙城录》尹知章梦持巨凿破其腹"> ← 上一章 </a></div> <div class="fhmulu"><a href="longchenglu1.html" title="《龙城录》正文">章节目录</a></div> <div class="nextxs"> <a href="1654399551.html" title="《龙城录》魏征善治酒"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
