，郡贼越卢氏，奔永宁。先是，守隘诸兵露宿几三月，皆致疫痢，不任战，左良玉自南乡赴援卢氏。十月初十日癸巳，贼陷陈州、灵宝。二十八日辛亥，陷卢氏。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1650591782.html" title="《明季北略》卷十·戴君恩诱斩王刚等"> ← 上一章 </a></div> <div class="fhmulu"><a href="mingjibeilue10.html" title="《明季北略》卷十">章节目录</a></div> <div class="nextxs"> <a href="1650591761.html" title="《明季北略》卷十·卢象升剿楚贼"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
