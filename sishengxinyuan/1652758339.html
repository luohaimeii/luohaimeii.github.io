<!doctype html><html lang="zh-Hans"> <head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><title>《四圣心源》卷二·六气解·六气解-虎思国学网</title><meta name="keywords" content="《四圣心源》卷二·六气解·六气解"><meta name="description" content="《四圣心源》卷二·六气解·六气解"><link rel="stylesheet" type="text/css" href="/statics/css/style.css"><link rel="shortcut icon" href="/statics/picture/favicon.ico" type="image/x-icon"><meta http-equiv="Cache-Control" content="no-transform"><meta http-equiv="Cache-Control" content="no-siteapp"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"><meta name="referrer" content="origin-when-cross-origin"><meta name="applicable-device" content="pc,mobile"><meta name="MobileOptimized" content="width"><meta name="HandheldFriendly" content="true"><meta name="renderer" content="webkit"><script type="text/javascript" src="/statics/js/home.js"></script></head> <body> <div class="header"> <div class="head"> <ul class="navbar-left"> <li> <a href="/"> <img src="/statics/picture/logo.png" class="logo" alt="国学经典"> </a> </li> <li class="index_sy"> <a href="/" title="首页"> 首页 </a> </li> <li> <a href="/jing/" title="经"> 经 </a> </li> <li> <a href="/shi/" title="史"> 史 </a> </li> <li> <a href="/zi/" title="子"> 子 </a> </li> <li> <a href="/ji/" title="集"> 集 </a> </li><li> <a href="/baike/" title="百科资料"> 百科</a> </li> </ul> <script type="text/javascript" src="/statics/js/navright.js"></script> </div> </div><div class="content"> <div class="xscontent"> <div class="wenztit"><h1>卷二·六气解·六气解</h1></div> <div class="wenzabout"> <div class="nextxs"> <a href="1652758358.html" title="《四圣心源》卷三·脉法解·二十四脉"> ← 上一章 </a></div> <div class="fhmulu"><a href="sishengxinyuan3.html" title="《四圣心源》卷二·六气解">章节目录</a></div> <div class="nextxs"> <a href="1652758328.html" title="《四圣心源》卷二·六气解·六气名目"> 下一章 → </a></div> </div> <div class="wenzbody"> <p>　　内外感伤，百变不穷，溯委穷源，不过六气。六气了彻，百病莫逃，义至简而法至精也。仲景既没，此义遂晦，寒热错讹，燥湿乖谬，零素雪于寒泉，飘温风于阳谷，以水益水而愈深，以火益火而弥热。生灵夭札，念之疚心，作六气解。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652758358.html" title="《四圣心源》卷三·脉法解·二十四脉"> ← 上一章 </a></div> <div class="fhmulu"><a href="sishengxinyuan3.html" title="《四圣心源》卷二·六气解">章节目录</a></div> <div class="nextxs"> <a href="1652758328.html" title="《四圣心源》卷二·六气解·六气名目"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
