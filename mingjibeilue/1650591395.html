揽权壅蔽，私其乡人，塘报章奏一字涉边疆盗贼，辄借军机密封，下部，明晨延臣摘发短长，他日败可以捷闻，功可以罪案也。皇上见延儒摘发细事，近于明敏，抑知特借此以行其私耳。上切责之，执御疏凡三上，俱留中。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1650591405.html" title="《明季北略》卷七·黄道周疏"> ← 上一章 </a></div> <div class="fhmulu"><a href="mingjibeilue7.html" title="《明季北略》卷七">章节目录</a></div> <div class="nextxs"> <a href="1650591384.html" title="《明季北略》卷七·张彝宪总理钱粮"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
