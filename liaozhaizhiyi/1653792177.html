<!doctype html><html lang="zh-Hans"> <head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><title>《聊斋志异》卷六·铁布衫法-虎思国学网</title><meta name="keywords" content="《聊斋志异》卷六·铁布衫法"><meta name="description" content="《聊斋志异》卷六·铁布衫法"><link rel="stylesheet" type="text/css" href="/statics/css/style.css"><link rel="shortcut icon" href="/statics/picture/favicon.ico" type="image/x-icon"><meta http-equiv="Cache-Control" content="no-transform"><meta http-equiv="Cache-Control" content="no-siteapp"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"><meta name="referrer" content="origin-when-cross-origin"><meta name="applicable-device" content="pc,mobile"><meta name="MobileOptimized" content="width"><meta name="HandheldFriendly" content="true"><meta name="renderer" content="webkit"><script type="text/javascript" src="/statics/js/home.js"></script></head> <body> <div class="header"> <div class="head"> <ul class="navbar-left"> <li> <a href="/"> <img src="/statics/picture/logo.png" class="logo" alt="国学经典"> </a> </li> <li class="index_sy"> <a href="/" title="首页"> 首页 </a> </li> <li> <a href="/jing/" title="经"> 经 </a> </li> <li> <a href="/shi/" title="史"> 史 </a> </li> <li> <a href="/zi/" title="子"> 子 </a> </li> <li> <a href="/ji/" title="集"> 集 </a> </li><li> <a href="/baike/" title="百科资料"> 百科</a> </li> </ul> <script type="text/javascript" src="/statics/js/navright.js"></script> </div> </div><div class="content"> <div class="xscontent"> <div class="wenztit"><h1>卷六·铁布衫法</h1></div> <div class="wenzabout"> <div class="nextxs"> <a href="1653792187.html" title="《聊斋志异》卷六·跳神"> ← 上一章 </a></div> <div class="fhmulu"><a href="liaozhaizhiyi6.html" title="《聊斋志异》卷六">章节目录</a></div> <div class="nextxs"> <a href="1653792167.html" title="《聊斋志异》卷六·大力将军"> 下一章 → </a></div> </div> <div class="wenzbody"> <p>　　沙回子得铁布衫大力法，骈其指力斫之，可断牛项；横搠之，可洞牛腹。曾在仇公子彭三家，悬木于空，遣两健仆极力撑去，猛反之，沙裸腹受木，砰然一声，木去远矣。又出其势即石上，以木椎力击之，无少损。但畏刀耳。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1653792187.html" title="《聊斋志异》卷六·跳神"> ← 上一章 </a></div> <div class="fhmulu"><a href="liaozhaizhiyi6.html" title="《聊斋志异》卷六">章节目录</a></div> <div class="nextxs"> <a href="1653792167.html" title="《聊斋志异》卷六·大力将军"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
