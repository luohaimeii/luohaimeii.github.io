<!doctype html><html lang="zh-Hans"> <head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><title>《聊斋志异》卷一·蛇癖-虎思国学网</title><meta name="keywords" content="《聊斋志异》卷一·蛇癖"><meta name="description" content="《聊斋志异》卷一·蛇癖"><link rel="stylesheet" type="text/css" href="/statics/css/style.css"><link rel="shortcut icon" href="/statics/picture/favicon.ico" type="image/x-icon"><meta http-equiv="Cache-Control" content="no-transform"><meta http-equiv="Cache-Control" content="no-siteapp"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"><meta name="referrer" content="origin-when-cross-origin"><meta name="applicable-device" content="pc,mobile"><meta name="MobileOptimized" content="width"><meta name="HandheldFriendly" content="true"><meta name="renderer" content="webkit"><script type="text/javascript" src="/statics/js/home.js"></script></head> <body> <div class="header"> <div class="head"> <ul class="navbar-left"> <li> <a href="/"> <img src="/statics/picture/logo.png" class="logo" alt="国学经典"> </a> </li> <li class="index_sy"> <a href="/" title="首页"> 首页 </a> </li> <li> <a href="/jing/" title="经"> 经 </a> </li> <li> <a href="/shi/" title="史"> 史 </a> </li> <li> <a href="/zi/" title="子"> 子 </a> </li> <li> <a href="/ji/" title="集"> 集 </a> </li><li> <a href="/baike/" title="百科资料"> 百科</a> </li> </ul> <script type="text/javascript" src="/statics/js/navright.js"></script> </div> </div><div class="content"> <div class="xscontent"> <div class="wenztit"><h1>卷一·蛇癖</h1></div> <div class="wenzabout"> <div class="nextxs"> <a href="1653789577.html" title="《聊斋志异》卷一·贾儿"> ← 上一章 </a></div> <div class="fhmulu"><a href="liaozhaizhiyi1.html" title="《聊斋志异》卷一">章节目录</a></div> <div class="nextxs"> <a href="/hongloumeng/1653714505.html" title="《红楼梦》情节梗概"> 下一章 → </a></div> </div> <div class="wenzbody"> <p>　　王蒲令之仆吕奉宁，性嗜蛇。每得小蛇，则全吞之如啖葱状；大者以刀寸寸断之，始掬以食。嚼之铮铮，血水沾颐。且善嗅，尝隔墙闻蛇香，急奔墙外，果得蛇盈尺。时无佩刀，先啮其头，尾尚蜿蜒于口际。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1653789577.html" title="《聊斋志异》卷一·贾儿"> ← 上一章 </a></div> <div class="fhmulu"><a href="liaozhaizhiyi1.html" title="《聊斋志异》卷一">章节目录</a></div> <div class="nextxs"> <a href="/hongloumeng/1653714505.html" title="《红楼梦》情节梗概"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
