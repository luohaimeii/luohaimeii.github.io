气味</strong><br>甘、寒、无毒。</p> <p><strong>主治</strong><br>小便不通。用象牙生煎服下。<br>小便过多。用象牙烧灰饮服。<br>骨刺入肉。用象牙刮末，和水煮过的白梅肉梅调匀涂患处，可使骨刺变软。<br>皮：<br>下疳。用象皮烧灰和油敷涂。<br>疮口不合。治方同上。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652506630.html" title="《本草纲目》兽部·豹"> ← 上一章 </a></div> <div class="fhmulu"><a href="bencaogangmu17.html" title="《本草纲目》兽部">章节目录</a></div> <div class="nextxs"> <a href="1652506610.html" title="《本草纲目》兽部·野猪"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
