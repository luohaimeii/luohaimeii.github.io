/p> <p>　　白术 干姜（各二两） 黄 （蜜水拌炒） 附子 川椒 杏仁（各一两） 甘草（五钱）</p> <p>　　共为粗末，水煎服四钱。初服冷热相搏，觉烦闷欲吐，少顷撮定，肺气自然下降矣。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652841087.html" title="《扁鹊心书》神方·五膈散"> ← 上一章 </a></div> <div class="fhmulu"><a href="bianquexinshu5.html" title="《扁鹊心书》神方">章节目录</a></div> <div class="nextxs"> <a href="1652841066.html" title="《扁鹊心书》神方·麦煎散"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
