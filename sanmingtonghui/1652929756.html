戊子，丙日临子，坐下正官，月时引旺，重逢奇仪。丙以癸为官，癸以戊为官，互换见官，丙合辛财生官，化为真水。戊子时，戊合子中癸，化为真火，入水火既济格，大贵。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652929766.html" title="《三命通会》卷五·金木间隔"> ← 上一章 </a></div> <div class="fhmulu"><a href="sanmingtonghui5.html" title="《三命通会》卷五">章节目录</a></div> <div class="nextxs"> <a href="1652929745.html" title="《三命通会》卷五·金火相成"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
