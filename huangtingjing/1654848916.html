<!doctype html><html lang="zh-Hans"> <head><meta content="text/html; charset=utf-8" http-equiv="Content-Type"><title>《黄庭经》内景·治生-虎思国学网</title><meta name="keywords" content="《黄庭经》内景·治生"><meta name="description" content="《黄庭经》内景·治生"><link rel="stylesheet" type="text/css" href="/statics/css/style.css"><link rel="shortcut icon" href="/statics/picture/favicon.ico" type="image/x-icon"><meta http-equiv="Cache-Control" content="no-transform"><meta http-equiv="Cache-Control" content="no-siteapp"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes"><meta http-equiv="Content-Type" content="text/html; charset=utf-8"><meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1"><meta name="referrer" content="origin-when-cross-origin"><meta name="applicable-device" content="pc,mobile"><meta name="MobileOptimized" content="width"><meta name="HandheldFriendly" content="true"><meta name="renderer" content="webkit"><script type="text/javascript" src="/statics/js/home.js"></script></head> <body> <div class="header"> <div class="head"> <ul class="navbar-left"> <li> <a href="/"> <img src="/statics/picture/logo.png" class="logo" alt="国学经典"> </a> </li> <li class="index_sy"> <a href="/" title="首页"> 首页 </a> </li> <li> <a href="/jing/" title="经"> 经 </a> </li> <li> <a href="/shi/" title="史"> 史 </a> </li> <li> <a href="/zi/" title="子"> 子 </a> </li> <li> <a href="/ji/" title="集"> 集 </a> </li><li> <a href="/baike/" title="百科资料"> 百科</a> </li> </ul> <script type="text/javascript" src="/statics/js/navright.js"></script> </div> </div><div class="content"> <div class="xscontent"> <div class="wenztit"><h1> 卷二十三 内景·治生</h1></div> <div class="wenzabout"> <div class="nextxs"> <a href="1654848926.html" title="《黄庭经》内景·常念"> ← 上一章 </a></div> <div class="fhmulu"><a href="huangtingjing1.html" title="《黄庭经》内景">章节目录</a></div> <div class="nextxs"> <a href="1654848906.html" title="《黄庭经》内景·隐景"> 下一章 → </a></div> </div> <div class="wenzbody"> <p>　　治生之道了不烦，但修洞玄与玉篇。兼行形中八景神，二十四真出自然。高拱无为魂魄安，清净神见与我言。安在紫房帏幕间，立坐室外三五玄。烧香接手玉华前，共入太室璇玑门。高研恬淡道之园，内视密盼尽睹真。真人在己莫问邻，何处远索求因缘。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1654848926.html" title="《黄庭经》内景·常念"> ← 上一章 </a></div> <div class="fhmulu"><a href="huangtingjing1.html" title="《黄庭经》内景">章节目录</a></div> <div class="nextxs"> <a href="1654848906.html" title="《黄庭经》内景·隐景"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
