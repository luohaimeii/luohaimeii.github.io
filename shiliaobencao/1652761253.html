家风。〔证余〕</p> <p>　　（二）消谷不化者，作 食，助脾气，令人能食。〔证余〕</p> <p>　　（三）患疳痢者，不得食。作羹 食，宜人。其功与鲫鱼同。〔证余〕</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1652761263.html" title="《食疗本草》卷中·黄鱼（鱼）〈平〉"> ← 上一章 </a></div> <div class="fhmulu"><a href="shiliaobencao2.html" title="《食疗本草》卷中">章节目录</a></div> <div class="nextxs"> <a href="1652761242.html" title="《食疗本草》卷中·牡鼠（鼠）"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
