。</p> <p>　　二、夏，六月，庚辰，晋侯去疾卒。</p> <p>　　三、秋，八月，葬晋顷公。</p> <p>　　四、冬，十有二月，吴灭徐，徐子章羽奔楚。</p> </div> <div class="wenzabout"> <div class="nextxs"> <a href="1650000020.html" title="《谷梁传》昭公·二十九年"> ← 上一章 </a></div> <div class="fhmulu"><a href="guliangzhuan10.html" title="《谷梁传》昭公">章节目录</a></div> <div class="nextxs"> <a href="1649999999.html" title="《谷梁传》昭公·三十一年"> 下一章→</a></div></div><script type="text/javascript" src="/statics/js/books.js"></script></div> </div> <div class="footer"> <div class="footdibu"> Powered by <a href="/">虎思国学网</a> All rights Reserved <br> Copyright 2002-2025 © https://www.Husir.cn <a target="_blank" rel="nofollow" href="https://beian.miit.gov.cn">闽ICP备2022000160号-2</a> </div> </div> <div class="shang"><a href="#"> ⇡ </a></div> </body> </html>
